name: Build Web3Gram APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm packages
        working-directory: mimo2.pro
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: mimo2.pro
        run: npm run build

      - name: Install Capacitor
        working-directory: mimo2.pro
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Initialize Capacitor
        working-directory: mimo2.pro
        run: npx cap init "Web3Gram" "andr.web3gram" --web-dir=dist

      - name: Add Android platform
        working-directory: mimo2.pro
        run: |
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin duplicate classes
        working-directory: mimo2.pro
        run: |
          cat >> android/app/build.gradle << 'EOF'
          
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          EOF

      - name: Create network security config
        working-directory: mimo2.pro
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">relay.walletconnect.com</domain>
                  <domain includeSubdomains="true">polygon-rpc.com</domain>
              </domain-config>
          </network-security-config>
          EOF

      - name: Build APK
        working-directory: mimo2.pro
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Web3Gram-APK
          path: mimo2.pro/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
