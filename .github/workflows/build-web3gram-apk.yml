name: 🔨 Build Web3Gram APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mimo2.pro/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install deps
        working-directory: mimo2.pro
        run: npm ci

      - name: 🔨 Build web
        working-directory: mimo2.pro
        run: npm run build

      - name: ⚡ Capacitor
        working-directory: mimo2.pro
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 🚀 Init
        working-directory: mimo2.pro
        run: npx cap init Web3Gram andr.web3gram --web-dir dist

      - name: 🤖 Android
        working-directory: mimo2.pro
        run: |
          npx cap add android
          npx cap sync android

      - name: 📁 Security config
        working-directory: mimo2.pro
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">relay.walletconnect.com</domain>
                  <domain includeSubdomains="true">polygon-rpc.com</domain>
              </domain-config>
          </network-security-config>
          EOF

      - name: 🏗️ Build APK
        working-directory: mimo2.pro
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: Web3Gram-APK
          path: mimo2.pro/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
