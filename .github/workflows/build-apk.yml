name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: qwen3.5.30.04.15.03-android-messenger/package-lock.json

      - name: Install dependencies
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: npm install

      - name: Build web app
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: npm run build

      - name: Sync Capacitor
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: npx cap sync android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK
        working-directory: qwen3.5.30.04.15.03-android-messenger/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: web3-messenger-debug
          path: qwen3.5.30.04.15.03-android-messenger/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

