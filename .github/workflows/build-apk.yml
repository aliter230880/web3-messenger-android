name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install base dependencies
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: npm install --legacy-peer-deps

      - name: Install WalletConnect and UI dependencies
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: |
          npm install --legacy-peer-deps \
            @walletconnect/ethereum-provider@^2.17.0 \
            vite-plugin-node-polyfills@^0.22.0 \
            @tailwindcss/vite \
            tailwindcss \
            framer-motion \
            lucide-react \
            ethers@^5.7.2 \
            zustand@^5.0.0

      - name: Install Capacitor packages
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: npm install --legacy-peer-deps @capacitor/core @capacitor/cli @capacitor/android @capacitor/splash-screen

      - name: Patch store for WalletConnect modal support
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: |
          node << 'NODE_EOF'
          const fs = require('fs');
          const storeFile = 'src/store/index.ts';
          if (!fs.existsSync(storeFile)) { console.log('Store not found, skipping'); process.exit(0); }
          let content = fs.readFileSync(storeFile, 'utf8');
          if (!content.includes('isWalletModalOpen')) {
            content = content.replace(/(isSettingsOpen:\s*false)/, '$1,\n  isWalletModalOpen: false');
            content = content.replace(
              /(toggleSettings:\s*\(\)\s*=>)/,
              'toggleWalletModal: () => set((state) => ({ isWalletModalOpen: !state.isWalletModalOpen })),\n  $1'
            );
            fs.writeFileSync(storeFile, content);
            console.log('Store patched with toggleWalletModal');
          } else {
            console.log('Store already has toggleWalletModal');
          }
          NODE_EOF

      - name: Create CI-safe vite config
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: |
          cat > vite.config.ts << 'VITE_EOF'
          import { defineConfig } from "vite";
          import react from "@vitejs/plugin-react";
          import tailwindcss from "@tailwindcss/vite";
          import { nodePolyfills } from "vite-plugin-node-polyfills";

          export default defineConfig({
            base: "./",
            plugins: [
              nodePolyfills({ include: ["buffer", "stream", "util", "events", "process"] }),
              react(),
              tailwindcss(),
            ],
            define: {
              global: "globalThis",
            },
            resolve: {
              dedupe: ["react", "react-dom"],
            },
            build: {
              outDir: "dist",
              emptyOutDir: true,
            },
          });
          VITE_EOF

      - name: Build web app
        working-directory: qwen3.5.30.04.15.03-android-messenger
        env:
          VITE_WALLETCONNECT_PROJECT_ID: "2de1d724533083c2ed68197548dead4e"
          VITE_APP_URL: "https://chat.aliterra.space"
          VITE_APP_PAGES_URL: "https://aliter230880.github.io/web3-messenger"
        run: npm run build

      - name: Create Capacitor config for CI
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "andr.web3gram",
            "appName": "Web3Gram",
            "webDir": "dist",
            "allowNavigation": [
              "*.walletconnect.com",
              "*.walletconnect.org",
              "metamask.app.link",
              "*.infura.io"
            ],
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": true
            }
          }
          EOF
          rm -f capacitor.config.ts

      - name: Remove incomplete android folder
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: rm -rf android

      - name: Add Android platform
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: qwen3.5.30.04.15.03-android-messenger
        run: npx cap sync android

      - name: Fix Kotlin duplicate classes conflict
        working-directory: qwen3.5.30.04.15.03-android-messenger/android
        run: |
          cat >> build.gradle << 'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22"
                  }
              }
          }
          EOF

      - name: Make gradlew executable
        working-directory: qwen3.5.30.04.15.03-android-messenger/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: qwen3.5.30.04.15.03-android-messenger/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: web3-messenger-debug
          path: qwen3.5.30.04.15.03-android-messenger/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
