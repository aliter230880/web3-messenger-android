name: Build Web3Gram Next.js APK

on:
  push:
    branches: [main, master]
    paths:
      - 'web3gram-nextjs/**'
      - '.github/workflows/build-web3gram-nextjs-apk.yml'
  workflow_dispatch:

env:
  APP_NAME: Web3Gram
  APP_ID: com.web3gram.nextjs
  WORKING_DIR: web3gram-nextjs

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses || true

      - name: Install npm dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install --legacy-peer-deps

      - name: Install Capacitor packages
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm install --legacy-peer-deps \
            @capacitor/core \
            @capacitor/cli \
            @capacitor/android \
            @capacitor/splash-screen

      - name: Build Next.js application
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build

      - name: Initialize Capacitor
        working-directory: ${{ env.WORKING_DIR }}
        run: npx cap init "${{ env.APP_NAME }}" "${{ env.APP_ID }}" --web-dir=.next

      - name: Add Android platform
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npx cap add android
          npx cap sync android

      - name: Configure network security
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">relay.walletconnect.com</domain>
                  <domain includeSubdomains="true">relay.walletconnect.org</domain>
                  <domain includeSub
