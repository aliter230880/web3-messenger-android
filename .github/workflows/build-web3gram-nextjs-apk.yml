name: Build Web3Gram Next.js APK

on:
  push:
    branches: [main, master]
    paths:
      - 'web3gram-nextjs/**'
      - '.github/workflows/build-web3gram-nextjs-apk.yml'
  workflow_dispatch:

env:
  APP_NAME: Web3Gram
  APP_ID: com.web3gram.nextjs
  WORKING_DIR: web3gram-nextjs

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses || true

      - name: Install npm dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install --legacy-peer-deps

      - name: Install Capacitor packages
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm install --legacy-peer-deps \
            @capacitor/core \
            @capacitor/cli \
            @capacitor/android \
            @capacitor/splash-screen

      - name: Build Next.js (static export)
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build

      # ─── Готовим папку для Capacitor ────────────────────────
      # Next.js static export кладёт файлы в .next/server/app/
      # Нужно собрать их в одну папку с index.html в корне
      - name: Prepare web assets for Capacitor
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "=== .next structure ==="
          find .next -name "index.html" 2>/dev/null | head -10
          echo ""
          ls -la .next/ 2>/dev/null | head -20
          echo ""

          # Создаём папку dist для Capacitor
          mkdir -p dist

          # Копируем index.html если есть в корне .next
          if [ -f ".next/index.html" ]; then
            cp .next/index.html dist/
            echo "✅ Copied .next/index.html to dist/"
          fi

          # Ищем index.html в .next/server/app/
          if [ -f ".next/server/app/index.html" ]; then
            cp .next/server/app/index.html dist/
            echo "✅ Copied .next/server/app/index.html to dist/"
          fi

          # Копируем все HTML файлы
          find .next -name "*.html" -exec cp --parents {} dist/ \; 2>/dev/null || true

          # Копируем static assets
          if [ -d ".next/static" ]; then
            cp -r .next/static dist/
            echo "✅ Copied .next/static to dist/"
          fi

          # Копируем из _next (Next.js static export)
          if [ -d ".next/server/app/_next" ]; then
            cp -r .next/server/app/_next dist/
            echo "✅ Copied _next to dist/"
          fi

          # Если всё пусто, создаём минимальный index.html
          if [ ! -f "dist/index.html" ]; then
            echo "⚠️ No index.html found, creating fallback..."
            # Ищем любой HTML и копируем как index.html
            FIRST_HTML=$(find .next -name "*.html" -print -quit 2>/dev/null)
            if [ -n "$FIRST_HTML" ]; then
              cp "$FIRST_HTML" dist/index.html
              echo "✅ Created dist/index.html from $FIRST_HTML"
            else
              # Создаём минимальный redirect
              cat > dist/index.html << 'HTMLEOF'
              <!DOCTYPE html>
              <html>
              <head><meta http-equiv="refresh" content="0;url=./server/app/index.html"></head>
              <body>Redirecting...</body>
              </html>
              HTMLEOF
              echo "✅ Created minimal dist/index.html"
            fi
          fi

          echo ""
          echo "=== Final dist/ structure ==="
          ls -la dist/
          echo ""
          find dist -name "index.html" | head -5

      - name: Initialize Capacitor (using dist/)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          rm -rf capacitor.config.json android
          npx cap init "${{ env.APP_NAME }}" "${{ env.APP_ID }}" --web-dir=dist

      - name: Add Android platform
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npx cap add android
          npx cap sync android

      - name: Configure network security
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'NETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">relay.walletconnect.com</domain>
                  <domain includeSubdomains="true">polygon-rpc.com</domain>
                  <domain includeSubdomains="true">chat.aliterra.space</domain>
              </domain-config>
          </network-security-config>
          NETEOF

      - name: Patch AndroidManifest for deep links
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
            sed -i 's|<application|<application\n        android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
          fi

          if ! grep -q "queries" "$MANIFEST"; then
            sed -i 's|</application>|    </application>\n    <queries>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="metamask" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="trust" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="wc" />\n        </intent>\n    </queries>|' "$MANIFEST"
          fi

      - name: Fix Kotlin/Gradle compatibility
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.9.22'
              }
          }
          EOF

      - name: Build debug APK
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web3gram-nextjs-build-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web3Gram-NextJS-debug
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
