name: Build Web3Gram APK v3
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    steps:
      - Checkout
      - Node.js 20
      - npm ci + build
      - Java 17 + Android SDK
      - Capacitor init + sync
      - Network security config
      - Deep links (metamask://, trust://, wc://)
      - ./gradlew assembleDebug
      - Upload artifact: web3gram-v3-debug
